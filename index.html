<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="description" content="GLSL live coding HTML custom helper element.">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>s-express</title>
    <script type="module">
      import { ShaderExpress, ShaderExpressModule } from "./main.js"
      const s = document.querySelector("s-express")

      // Order matters in this case and attaching the error
      // listener needs to come ahead of element definition.
      s?.addEventListener("error", function onerror(e) {
        console.log("error", e?.message)

        video.onloadedmetadata = async () => {
          edit?.removeAttribute("disabled")
        }
      })

      s?.addEventListener("ready", function onready(e) {
        setTimeout(async () => {
          await e?.detail?.video?.pause()
        }, 120000)
      })

      // Same.
      self.customElements?.define("s-express-module", ShaderExpressModule)
      self.customElements?.define("s-express", ShaderExpress)

      const savebutton = document.querySelector("button.save")

      savebutton?.addEventListener("click", function onclick() {
        const e = new Event("save")

        s?.dispatchEvent(e)
      })

      const openbutton = document.querySelector("button.open")

      openbutton?.addEventListener("click", function onclick() {
        const e = new Event("open")

        s?.dispatchEvent(e)
      })

      const editbutton = document.querySelector("button.edit")

      editbutton.addEventListener("click", function onclick() {
        const e = new Event("edit")

        s?.dispatchEvent(e)
      })
    </script>
    <style>
      html {
        font: medium/normal sans-serif;
        height: 100%;
      }
      body {
        display: grid;
        margin: 0;
        min-height: 100%;
      }
      figure {
        margin: auto;
        position: relative;
        width: 100%;
      }
      figcaption {
        font-size: small;
        left: 0;
        margin: auto;
        max-width: calc(100% - 4rem);
        position: absolute;
        right: 0;
        text-align: center;
        width: 30rem;
      }
      s-express:not(:defined) {
        color: transparent;
        font: small/1 monospace;
        white-space: pre;
      }
      s-express {
        aspect-ratio: 16 / 9;
        display: block;
        background: whitesmoke;
        margin: 1.5rem auto 0;
        max-width: 40rem;
        width: calc(100% - 3rem);
      }
      @media all and (max-width: 640px), all and (max-height: 500px) {
        figcaption span {
          display: none;
        }
      }
    </style>
    <noscript>
      <style>
        s-express {
          background: url("screenshot.png") center/contain no-repeat;
        }
      </style>
    </noscript>
  </head>
  <body>
    <figure>
      <s-express autoplay="autoplay" controls="controls" height="360" width="640">
        <s-express-module src="noise.glsl"></s-express-module>
void sketch(in vec2 p, out vec4 oColor) {
  vec3 c = vec3(p * 5.0, uTime * 0.001 * 0.25);
  oColor = vec4(vec3(noise(c)), 1.0);
}
      </s-express>
      <figcaption>
        <p><span>Helps with GLSL live coding</span> <button class="edit">Edit</button> <button class="open">Import</button> <button class="save">Save</button></p>
      </figcaption>
    </figure>
  </body>
</html>
